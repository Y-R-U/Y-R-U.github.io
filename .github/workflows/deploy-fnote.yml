name: Deploy fnote to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'app/pwa/fnote/**'
      - '.github/workflows/deploy-fnote.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Pages
        run: cd app/pwa/fnote && npx wrangler pages deploy . --project-name fnote --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 923cdf859ffb1c6b2d38f267d9521078
