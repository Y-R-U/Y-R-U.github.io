<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050509">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Void Cockpit</title>
  <link rel="preload" href="assets/cockpit-chroma.png" as="image">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" data-state="menu">
    <canvas id="space-canvas" aria-label="Void Cockpit 3D space game canvas"></canvas>
    <canvas id="cockpit-canvas" aria-hidden="true"></canvas>
    <div id="glass-haze" aria-hidden="true"></div>
    <div id="damage-flash" aria-hidden="true"></div>

    <section id="hud" class="hud hidden" aria-live="polite">
      <div class="status-strip">
        <div class="hud-cell">
          <span>Shield</span>
          <strong id="shield-value">100</strong>
          <div class="meter"><i id="shield-meter"></i></div>
        </div>
        <div class="hud-cell score-cell">
          <span>Score</span>
          <strong id="score-value">0</strong>
        </div>
        <div class="hud-cell">
          <span>Heat</span>
          <strong id="heat-value">0</strong>
          <div class="meter hot"><i id="heat-meter"></i></div>
        </div>
      </div>
      <div class="signal-line">
        <span id="sector-value">CINDERS / 01</span>
        <span id="threat-value">CLEAR</span>
      </div>
    </section>

    <div id="reticle" class="reticle hidden" aria-hidden="true">
      <span class="reticle-ring"></span>
      <span class="reticle-cross x"></span>
      <span class="reticle-cross y"></span>
    </div>

    <button id="fire-button" class="fire-button hidden" type="button" aria-label="Fire pulse cannon">
      <span></span>
    </button>

    <section id="menu" class="overlay">
      <div class="launch-panel">
        <p class="kicker">deep-space cockpit</p>
        <h1>Void Cockpit</h1>
        <div class="launch-readout">
          <span>Station Field</span>
          <b>AR-7</b>
        </div>
        <button id="start-button" class="primary-action" type="button">Launch</button>
      </div>
    </section>

    <section id="result" class="overlay hidden">
      <div class="launch-panel result-panel">
        <p class="kicker" id="result-kicker">signal lost</p>
        <h2 id="result-title">Hull Breach</h2>
        <div class="result-grid">
          <div>
            <span>Score</span>
            <strong id="result-score">0</strong>
          </div>
          <div>
            <span>Best</span>
            <strong id="result-best">0</strong>
          </div>
          <div>
            <span>Wave</span>
            <strong id="result-wave">1</strong>
          </div>
        </div>
        <button id="restart-button" class="primary-action" type="button">Relaunch</button>
      </div>
    </section>

    <section id="boot-error" class="overlay hidden" aria-live="assertive">
      <div class="launch-panel">
        <p class="kicker">render error</p>
        <h2>WebGL Unavailable</h2>
        <p id="boot-error-message" class="boot-copy">The renderer did not start.</p>
      </div>
    </section>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
    const markGameError = (error) => {
      const message = String(error?.message || error || 'Unknown render error');
      document.documentElement.dataset.gameError = message;
      const overlay = document.getElementById('boot-error');
      const messageEl = document.getElementById('boot-error-message');
      if (messageEl) messageEl.textContent = message;
      if (overlay) overlay.classList.remove('hidden');
    };

    window.addEventListener('error', (event) => markGameError(event.error || event.message));
    window.addEventListener('unhandledrejection', (event) => markGameError(event.reason));
    import('./game.mjs?v=20260609a').catch(markGameError);
  </script>
</body>
</html>
