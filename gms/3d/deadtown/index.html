<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1c18" />
  <title>Deadtown — a zombie shooter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container"></div>

  <!-- boot / loading -->
  <div id="boot">
    <div class="boot-card">
      <div class="boot-title">DEADTOWN</div>
      <div class="boot-sub">survive the streets</div>
      <div id="boot-bar"><i></i></div>
      <div id="boot-status">loading…</div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <!-- top-left vitals -->
    <div id="vitals">
      <div class="bar hp"><span class="ic">❤️</span><div class="track"><i id="hp-fill"></i></div><b id="hp-num">100</b></div>
      <div id="row2">
        <div class="chip ammo-chip"><span id="ammo-kind">🔫</span><b id="ammo">24</b></div>
        <div class="chip"><span>💀</span><b id="score">0</b></div>
      </div>
    </div>

    <!-- minimap top-right -->
    <div id="map-wrap"><canvas id="minimap" width="150" height="150"></canvas></div>

    <!-- objective banner -->
    <div id="objective" class="hidden"></div>

    <!-- centre interaction prompt -->
    <div id="prompt" class="hidden"></div>

    <!-- bottom: weapon picker + action buttons -->
    <div id="weapons"></div>
    <div id="actionbar">
      <button id="act-med" title="Use medkit (R)">🩹<b id="med-num">1</b></button>
      <button id="act-use" class="hidden" title="Interact (E)">✋<small>Use</small></button>
    </div>

    <div id="hint">Hold &amp; drag anywhere to move · the laser auto-aims · two fingers to look</div>
    <div id="toasts"></div>
    <div id="dmgflash"></div>

    <!-- floating joystick (positioned by controls.js) -->
    <div id="joy-base"></div>
    <div id="joy-knob"></div>
  </div>

  <!-- bedroom cold-open overlay -->
  <div id="intro" class="hidden">
    <div id="intro-title"></div>
    <div id="intro-sub"></div>
    <div id="intro-skip"></div>
  </div>

  <!-- death -->
  <div id="panel-death" class="modal hidden">
    <div class="modal-card">
      <h2>YOU DIED</h2>
      <p id="death-stats"></p>
      <button id="btn-restart">Try again</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
