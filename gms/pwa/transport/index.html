<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Transport Empire</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://cdn.babylonjs.com">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2744;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --gold: #f5a623;
            --gold-glow: rgba(245, 166, 35, 0.3);
            --green: #4ecca3;
            --green-glow: rgba(78, 204, 163, 0.3);
            --blue: #00b4d8;
            --text-primary: #eee;
            --text-secondary: #a0a0b0;
            --text-muted: #666;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            touch-action: manipulation;
        }

        /* Main layout */
        #game-container {
            display: flex; flex-direction: column; height: 100vh; height: 100dvh;
            max-width: 500px; margin: 0 auto; position: relative;
        }

        /* Top bar */
        #top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border); z-index: 10;
            flex-shrink: 0;
        }
        #top-bar .money { font-size: 1.3em; font-weight: 700; color: var(--gold); }
        #top-bar .per-sec { font-size: 0.75em; color: var(--text-secondary); margin-left: 4px; }
        .top-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: var(--bg-card); color: var(--text-primary); font-size: 1.1em;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .top-btn:hover { background: var(--bg-card-hover); }
        .top-btns { display: flex; gap: 6px; }
        #prestige-points {
            font-size: 0.8em; color: var(--accent); margin-left: 8px;
            display: flex; align-items: center; gap: 3px;
        }

        /* 3D Viewport */
        #render-canvas {
            width: 100%; height: 180px; flex-shrink: 0;
            display: block; outline: none; touch-action: none;
        }

        /* Click area overlay on canvas */
        #click-overlay {
            position: absolute; top: 48px; left: 0; right: 0; height: 180px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 5;
        }
        #click-overlay.clickable { pointer-events: auto; cursor: pointer; }
        .click-prompt {
            background: rgba(233,69,96,0.9); color: #fff; padding: 8px 20px;
            border-radius: 20px; font-weight: 600; font-size: 0.9em;
            animation: pulse-click 1.5s ease-in-out infinite;
        }
        @keyframes pulse-click {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* Floating earnings */
        .float-earn {
            position: absolute; pointer-events: none; z-index: 20;
            font-weight: 700; font-size: 1.1em; color: var(--gold);
            animation: float-up 1s ease-out forwards;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        @keyframes float-up {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
        }

        /* Tab bar */
        #tab-bar {
            display: flex; background: var(--bg-secondary);
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 8px 4px; border: none; background: none;
            color: var(--text-secondary); font-size: 0.7em; font-weight: 600;
            cursor: pointer; text-align: center; transition: all 0.2s;
            border-bottom: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn .tab-icon { font-size: 1.4em; }
        .tab-badge {
            background: var(--accent); color: #fff; font-size: 0.65em;
            padding: 1px 5px; border-radius: 8px; position: absolute;
            top: 2px; right: calc(50% - 18px);
        }

        /* Content panels */
        #content-area {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 8px; -webkit-overflow-scrolling: touch;
        }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Business cards */
        .biz-card {
            background: var(--bg-card); border-radius: var(--radius);
            padding: 12px; margin-bottom: 8px; border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .biz-card.locked {
            opacity: 0.5; filter: grayscale(0.5);
        }
        .biz-card .biz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px;
        }
        .biz-card .biz-name {
            font-weight: 700; font-size: 0.95em;
            display: flex; align-items: center; gap: 6px;
        }
        .biz-card .biz-icon { font-size: 1.2em; }
        .biz-card .biz-level {
            font-size: 0.7em; color: var(--text-secondary);
            background: var(--bg-primary); padding: 2px 8px; border-radius: 10px;
        }
        .biz-card .biz-earnings {
            font-size: 0.8em; color: var(--green); margin-bottom: 6px;
        }
        .biz-card .biz-progress {
            height: 6px; background: var(--bg-primary); border-radius: 3px;
            margin-bottom: 8px; overflow: hidden;
        }
        .biz-card .biz-progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--green), var(--blue));
            border-radius: 3px; transition: width 0.1s linear;
        }
        .biz-card .biz-actions {
            display: flex; gap: 6px;
        }

        /* Buttons */
        .btn {
            padding: 8px 14px; border-radius: 8px; border: none;
            font-weight: 600; font-size: 0.78em; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #c73550);
            color: #fff;
        }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary {
            background: var(--bg-primary); color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #d4941e);
            color: #1a1a2e;
        }
        .btn-green {
            background: linear-gradient(135deg, var(--green), #3baa88);
            color: #1a1a2e;
        }
        .btn-full { width: 100%; justify-content: center; }

        /* Upgrade cards */
        .upgrade-card {
            background: var(--bg-card); border-radius: var(--radius);
            padding: 12px; margin-bottom: 8px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .upgrade-card.purchased { opacity: 0.5; border-color: var(--green); }
        .upgrade-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--bg-primary); display: flex; align-items: center;
            justify-content: center; font-size: 1.3em; flex-shrink: 0;
        }
        .upgrade-info { flex: 1; min-width: 0; }
        .upgrade-name { font-weight: 600; font-size: 0.85em; }
        .upgrade-desc { font-size: 0.7em; color: var(--text-secondary); margin-top: 2px; }
        .upgrade-cost { font-size: 0.75em; color: var(--gold); margin-top: 3px; }

        /* Achievement cards */
        .achieve-card {
            background: var(--bg-card); border-radius: var(--radius);
            padding: 10px 12px; margin-bottom: 6px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .achieve-card.unlocked { border-color: var(--gold); }
        .achieve-card.unlocked .achieve-icon { background: var(--gold); color: #1a1a2e; }
        .achieve-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--bg-primary); display: flex; align-items: center;
            justify-content: center; font-size: 1.1em; flex-shrink: 0;
        }
        .achieve-info { flex: 1; }
        .achieve-name { font-weight: 600; font-size: 0.82em; }
        .achieve-desc { font-size: 0.68em; color: var(--text-secondary); margin-top: 1px; }
        .achieve-reward { font-size: 0.65em; color: var(--green); margin-top: 2px; }

        /* Prestige panel */
        .prestige-info {
            text-align: center; padding: 20px;
        }
        .prestige-info h2 { color: var(--accent); margin-bottom: 10px; }
        .prestige-current { font-size: 2em; color: var(--gold); font-weight: 700; }
        .prestige-earn { color: var(--green); margin: 10px 0; }
        .prestige-bonuses { margin: 16px 0; text-align: left; }
        .prestige-bonus-row {
            display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid var(--border); font-size: 0.85em;
        }

        /* Stats panel */
        .stat-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid var(--border); font-size: 0.85em;
        }
        .stat-label { color: var(--text-secondary); }
        .stat-value { color: var(--text-primary); font-weight: 600; }

        /* Modal overlay */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 100; display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-secondary); border-radius: 16px; padding: 24px;
            max-width: 360px; width: 100%; border: 1px solid var(--border);
            animation: modal-in 0.3s ease-out;
            max-height: 85vh; overflow-y: auto;
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h3 { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .modal-close {
            position: absolute; top: 12px; right: 12px;
            width: 30px; height: 30px; border-radius: 50%; border: none;
            background: var(--bg-card); color: var(--text-primary);
            cursor: pointer; font-size: 1em; display: flex; align-items: center; justify-content: center;
        }

        /* Settings */
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .setting-label { font-size: 0.9em; }
        .toggle {
            width: 48px; height: 26px; border-radius: 13px; border: none;
            background: var(--text-muted); cursor: pointer; position: relative;
            transition: background 0.3s;
        }
        .toggle.on { background: var(--green); }
        .toggle::after {
            content: ''; position: absolute; width: 22px; height: 22px;
            border-radius: 50%; background: #fff; top: 2px; left: 2px;
            transition: transform 0.3s;
        }
        .toggle.on::after { transform: translateX(22px); }
        .volume-slider {
            -webkit-appearance: none; width: 100px; height: 4px;
            background: var(--text-muted); border-radius: 2px; outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
        }

        /* Random event banner */
        #event-banner {
            position: absolute; top: 52px; left: 8px; right: 8px; z-index: 15;
            background: linear-gradient(135deg, var(--gold), #e88a1a);
            color: #1a1a2e; border-radius: 10px; padding: 10px 14px;
            display: none; cursor: pointer; font-weight: 600; font-size: 0.85em;
            animation: slide-down 0.3s ease-out;
            box-shadow: 0 4px 15px var(--gold-glow);
        }
        #event-banner.show { display: flex; align-items: center; gap: 8px; }
        @keyframes slide-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #event-banner .event-timer {
            margin-left: auto; background: rgba(0,0,0,0.2); padding: 2px 8px;
            border-radius: 10px; font-size: 0.85em;
        }

        /* Toast notification */
        #toast-container {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            z-index: 200; display: flex; flex-direction: column; gap: 6px;
            pointer-events: none; max-width: 350px; width: 90%;
        }
        .toast {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px; font-size: 0.82em;
            animation: toast-in 0.3s ease-out;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 8px;
        }
        .toast.achievement { border-color: var(--gold); }
        .toast.event { border-color: var(--green); }
        @keyframes toast-in {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

        /* Section headers */
        .section-header {
            font-size: 0.75em; color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 1px; margin: 12px 0 6px; padding-left: 4px;
        }

        /* Bonus indicator */
        .bonus-bar {
            background: var(--bg-card); border-radius: 8px; padding: 6px 10px;
            margin-bottom: 8px; font-size: 0.75em; display: none;
            border: 1px solid var(--green); color: var(--green);
        }
        .bonus-bar.show { display: flex; align-items: center; gap: 6px; }

        /* Loading screen */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-primary);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500;
        }
        #loading-screen h1 { color: var(--accent); font-size: 1.8em; margin-bottom: 8px; }
        #loading-screen p { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 20px; }
        .loader-bar {
            width: 200px; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden;
        }
        .loader-bar-fill {
            height: 100%; background: var(--accent); border-radius: 2px; width: 0%;
            transition: width 0.3s;
        }

        /* Install prompt */
        #install-prompt {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-secondary); border-top: 1px solid var(--border);
            padding: 12px 16px; z-index: 50; display: none;
            max-width: 500px; margin: 0 auto;
        }
        #install-prompt.show { display: flex; align-items: center; gap: 12px; }
        #install-prompt p { flex: 1; font-size: 0.82em; }
        #install-dismiss {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.2em; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <h1>Transport Empire</h1>
        <p>Building your empire...</p>
        <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
    </div>

    <div id="game-container">
        <!-- Top Bar -->
        <div id="top-bar">
            <div style="display:flex;align-items:baseline;flex-wrap:wrap;">
                <span class="money" id="money-display">$0</span>
                <span class="per-sec" id="per-sec-display">$0/s</span>
                <span id="prestige-points"></span>
            </div>
            <div class="top-btns">
                <button class="top-btn" id="btn-stats" title="Stats">&#x1f4ca;</button>
                <button class="top-btn" id="btn-settings" title="Settings">&#x2699;</button>
            </div>
        </div>

        <!-- 3D Viewport -->
        <canvas id="render-canvas"></canvas>

        <!-- Click overlay -->
        <div id="click-overlay">
            <div class="click-prompt" id="click-prompt" style="display:none;">Tap to Earn!</div>
        </div>

        <!-- Event banner -->
        <div id="event-banner">
            <span id="event-icon"></span>
            <span id="event-text"></span>
            <span class="event-timer" id="event-timer"></span>
        </div>

        <!-- Active bonuses -->
        <div class="bonus-bar" id="bonus-bar">
            <span>&#x26a1;</span> <span id="bonus-text"></span>
        </div>

        <!-- Tab bar -->
        <div id="tab-bar">
            <button class="tab-btn active" data-tab="businesses">
                <span class="tab-icon">&#x1f3ed;</span>Routes
            </button>
            <button class="tab-btn" data-tab="upgrades">
                <span class="tab-icon">&#x2b06;</span>Upgrades
            </button>
            <button class="tab-btn" data-tab="prestige">
                <span class="tab-icon">&#x2b50;</span>Prestige
            </button>
            <button class="tab-btn" data-tab="achievements">
                <span class="tab-icon">&#x1f3c6;</span>Achieve
            </button>
        </div>

        <!-- Content Area -->
        <div id="content-area">
            <div class="panel active" id="panel-businesses"></div>
            <div class="panel" id="panel-upgrades"></div>
            <div class="panel" id="panel-prestige"></div>
            <div class="panel" id="panel-achievements"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal" style="position:relative;">
            <button class="modal-close" id="settings-close">&times;</button>
            <h3>&#x2699; Settings</h3>
            <div class="setting-row">
                <span class="setting-label">Sound Effects</span>
                <button class="toggle on" id="toggle-sfx"></button>
            </div>
            <div class="setting-row">
                <span class="setting-label">Music</span>
                <button class="toggle on" id="toggle-music"></button>
            </div>
            <div class="setting-row">
                <span class="setting-label">Music Volume</span>
                <input type="range" class="volume-slider" id="music-volume" min="0" max="100" value="30">
            </div>
            <div class="setting-row">
                <span class="setting-label">SFX Volume</span>
                <input type="range" class="volume-slider" id="sfx-volume" min="0" max="100" value="50">
            </div>
            <div style="margin-top: 16px;">
                <button class="btn btn-secondary btn-full" id="btn-export" style="margin-bottom:8px;">Export Save</button>
                <button class="btn btn-secondary btn-full" id="btn-import" style="margin-bottom:8px;">Import Save</button>
                <button class="btn btn-primary btn-full" id="btn-hard-reset" style="background:linear-gradient(135deg,#e74c3c,#c0392b);">Hard Reset</button>
            </div>
            <p style="font-size:0.65em;color:var(--text-muted);text-align:center;margin-top:12px;">Transport Empire v1.0 &bull; Kenney Assets</p>
        </div>
    </div>

    <!-- Stats Modal -->
    <div class="modal-overlay" id="stats-modal">
        <div class="modal" style="position:relative;">
            <button class="modal-close" id="stats-close">&times;</button>
            <h3>&#x1f4ca; Statistics</h3>
            <div id="stats-content"></div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal" style="position:relative;text-align:center;">
            <h3 id="confirm-title"></h3>
            <p id="confirm-text" style="font-size:0.85em;color:var(--text-secondary);margin-bottom:16px;"></p>
            <div style="display:flex;gap:8px;justify-content:center;">
                <button class="btn btn-secondary" id="confirm-no">Cancel</button>
                <button class="btn btn-primary" id="confirm-yes">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal-overlay" id="import-modal">
        <div class="modal" style="position:relative;">
            <button class="modal-close" id="import-close">&times;</button>
            <h3>Import Save</h3>
            <p style="font-size:0.82em;color:var(--text-secondary);margin-bottom:12px;">Paste your save data below:</p>
            <textarea id="import-data" style="width:100%;height:100px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);padding:8px;font-size:0.8em;resize:none;"></textarea>
            <button class="btn btn-primary btn-full" id="btn-do-import" style="margin-top:8px;">Import</button>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Install prompt -->
    <div id="install-prompt">
        <p>Install Transport Empire for the best experience!</p>
        <button class="btn btn-primary" id="install-btn">Install</button>
        <button id="install-dismiss">&times;</button>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/economy.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/events.js"></script>
    <script src="js/actions.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
