<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Dicey - A fun board game of luck and strategy!">
    <title>Dicey</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Title Screen -->
        <div id="title-screen" class="screen active">
            <div class="title-bg"></div>
            <div class="title-content">
                <div class="title-logo">
                    <canvas id="title-dice-canvas" width="120" height="120"></canvas>
                    <h1 class="game-title">DICEY</h1>
                    <p class="game-subtitle">Roll Your Fortune</p>
                </div>
                <div class="title-buttons">
                    <button id="btn-new-game" class="btn btn-primary btn-large pulse-anim">
                        <span class="btn-icon">&#x1F3B2;</span> New Game
                    </button>
                    <button id="btn-how-to-play" class="btn btn-secondary">
                        <span class="btn-icon">&#x1F4D6;</span> How to Play
                    </button>
                </div>
                <p class="version-text">v1.0</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Top HUD -->
            <div id="top-hud">
                <div id="current-player-info">
                    <div id="cp-avatar"></div>
                    <div id="cp-details">
                        <span id="cp-name">Player</span>
                        <span id="cp-money">$1500</span>
                        <span id="cp-shields">🛡️ 4</span>
                    </div>
                </div>
                <div id="round-info">Round <span id="round-num">1</span>/30</div>
                <button id="btn-settings" class="btn-icon-only" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.73 12.73l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>

            <!-- Board Canvas -->
            <div id="board-wrapper">
                <canvas id="board-canvas"></canvas>
            </div>

            <!-- Owned property cards strip -->
            <div id="cards-strip">
                <div id="cards-scroll"></div>
            </div>

            <!-- Bottom HUD -->
            <div id="bottom-hud">
                <div id="dice-action-row">
                    <div id="dice-area">
                        <canvas id="dice-canvas" width="140" height="70"></canvas>
                    </div>
                    <div id="action-area">
                        <button id="btn-roll" class="btn btn-primary btn-roll" style="display:none;">Roll Dice</button>
                    </div>
                </div>
                <div id="player-bar">
                    <div class="player-pip" data-player="0"></div>
                    <div class="player-pip" data-player="1"></div>
                    <div class="player-pip" data-player="2"></div>
                    <div class="player-pip" data-player="3"></div>
                </div>
            </div>
        </div>

        <!-- Overlay container for all panels/modals -->
        <div id="overlay" class="hidden">
            <div id="overlay-bg"></div>
            <div id="panel-container"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/board.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
