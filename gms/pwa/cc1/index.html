<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Triad Clash</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <div class="start-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 120 120" class="logo-svg">
                            <defs>
                                <linearGradient id="grad-w" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#ff6b6b"/><stop offset="100%" style="stop-color:#c0392b"/>
                                </linearGradient>
                                <linearGradient id="grad-a" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#51cf66"/><stop offset="100%" style="stop-color:#27ae60"/>
                                </linearGradient>
                                <linearGradient id="grad-m" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#7c5ce0"/><stop offset="100%" style="stop-color:#5b3cc4"/>
                                </linearGradient>
                            </defs>
                            <polygon points="60,10 110,95 10,95" fill="none" stroke="url(#grad-w)" stroke-width="3"/>
                            <polygon points="60,25 95,85 25,85" fill="none" stroke="url(#grad-a)" stroke-width="3"/>
                            <polygon points="60,40 80,75 40,75" fill="none" stroke="url(#grad-m)" stroke-width="3"/>
                            <circle cx="60" cy="58" r="8" fill="#ffd700" opacity="0.8"/>
                        </svg>
                    </div>
                    <h1 class="game-title">Triad Clash</h1>
                    <p class="game-subtitle">Warrior &bull; Archer &bull; Mage</p>
                </div>

                <div class="player-setup">
                    <h2>Players</h2>
                    <div class="player-config">
                        <div class="config-row">
                            <label>Human Players</label>
                            <div class="counter">
                                <button class="counter-btn" data-target="humans" data-dir="-1">−</button>
                                <span id="human-count">1</span>
                                <button class="counter-btn" data-target="humans" data-dir="1">+</button>
                            </div>
                        </div>
                        <div class="config-row">
                            <label>AI Opponents</label>
                            <div class="counter">
                                <button class="counter-btn" data-target="ai" data-dir="-1">−</button>
                                <span id="ai-count">1</span>
                                <button class="counter-btn" data-target="ai" data-dir="1">+</button>
                            </div>
                        </div>
                        <p class="player-info" id="player-info">2 players total</p>
                    </div>
                </div>

                <div class="start-buttons">
                    <button id="btn-play" class="btn btn-primary btn-large">Battle!</button>
                    <button id="btn-how-to-play" class="btn btn-secondary">How to Play</button>
                </div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="round-info">
                    <span id="round-display">Round 1 / 12</span>
                </div>
                <div class="scores-bar" id="scores-bar"></div>
                <button id="btn-settings" class="btn-icon settings-btn" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>

            <div class="battle-area">
                <div class="opponent-zone" id="opponent-zone"></div>
                <div class="vs-indicator" id="vs-indicator">VS</div>
                <div class="player-zone" id="player-zone"></div>
            </div>

            <div class="hand-area" id="hand-area">
                <div class="hand-label">Your Hand <span id="cards-remaining"></span></div>
                <div class="hand-cards" id="hand-cards"></div>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="screen">
            <div class="result-content">
                <h1 id="result-title"></h1>
                <div id="final-scores"></div>
                <div class="result-buttons">
                    <button id="btn-play-again" class="btn btn-primary btn-large">Play Again</button>
                    <button id="btn-main-menu" class="btn btn-secondary">Main Menu</button>
                </div>
            </div>
        </div>

        <!-- MODAL OVERLAY -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal" id="modal">
                <button class="modal-close" id="modal-close">&times;</button>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>

        <!-- ROUND RESULT POPUP -->
        <div id="round-result-overlay" class="round-result-overlay">
            <div class="round-result-card" id="round-result-card">
                <div id="round-result-content"></div>
            </div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
