<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1611">
<title>Sunday League ⚽</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <!-- In-match HUD (DOM for crispness) -->
  <div id="hud" class="hidden">
    <div id="scorebar">
      <span id="sbHome" class="sb-team"></span>
      <span id="sbScore">0 : 0</span>
      <span id="sbAway" class="sb-team"></span>
      <span id="sbClock">00:00</span>
    </div>
    <div id="ticker"></div>
    <button id="pauseBtn" aria-label="Pause">II</button>
  </div>

  <!-- Menu screens (content built by ui.js) -->
  <section id="scr-menu" class="screen hidden"></section>
  <section id="scr-career" class="screen hidden"></section>
  <section id="scr-pick" class="screen hidden"></section>
  <section id="scr-cup" class="screen hidden"></section>

  <div id="modal-root"></div>
  <div id="orient-hint" class="hidden">Best played in portrait 📱</div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
