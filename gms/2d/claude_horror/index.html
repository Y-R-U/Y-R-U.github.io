<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0608">
<title>The Hollow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== INTRO / WAKE SCREEN ===== -->
<section id="intro-screen" class="screen active" aria-label="Wake up">
  <div class="intro-vignette"></div>
  <div class="intro-content">
    <p id="intro-prompt">tap to wake</p>
    <div id="intro-eye" aria-hidden="true">
      <div class="eyelid top"></div>
      <div class="eye"><div class="pupil"></div></div>
      <div class="eyelid bottom"></div>
    </div>
    <p class="intro-hint">keep tapping…</p>
  </div>
</section>

<!-- ===== TITLE SCREEN ===== -->
<section id="title-screen" class="screen" aria-label="Title">
  <div class="title-bg" id="title-bg"></div>
  <div class="title-overlay"></div>
  <div class="title-content">
    <h1 class="title-h">The Hollow</h1>
    <p class="title-sub">a small horror</p>
    <div class="title-buttons">
      <button class="btn primary" id="btn-new">Begin</button>
      <button class="btn" id="btn-continue" hidden>Continue</button>
      <button class="btn ghost" id="btn-history-title" hidden>Story so far</button>
    </div>
    <p class="title-credit">tap the cog at any time for sound</p>
  </div>
</section>

<!-- ===== GAME SCREEN ===== -->
<section id="game-screen" class="screen" aria-label="Game">
  <div class="image-wrap">
    <img id="room-image" alt="" />
    <div class="image-fade"></div>
    <div class="room-title-overlay">
      <h2 id="room-title"></h2>
    </div>
  </div>

  <div class="text-wrap">
    <p id="room-text"></p>
    <div id="inventory-strip" class="inventory-strip" hidden></div>
    <div id="choices" class="choices"></div>
  </div>
</section>

<!-- ===== ENDING SCREEN ===== -->
<section id="ending-screen" class="screen" aria-label="Ending">
  <div class="image-wrap">
    <img id="ending-image" alt="" />
    <div class="image-fade strong"></div>
  </div>
  <div class="ending-content">
    <p class="ending-kind" id="ending-kind"></p>
    <h2 id="ending-title"></h2>
    <p id="ending-text"></p>
    <div class="ending-buttons">
      <button class="btn primary" id="btn-ending-restart">Begin again</button>
      <button class="btn ghost" id="btn-ending-history">Read your story</button>
    </div>
  </div>
</section>

<!-- ===== TOP-RIGHT CONTROLS ===== -->
<div class="top-controls">
  <button id="btn-history" class="icon-btn" aria-label="Story so far" title="Story so far" hidden>
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M4 5h12a3 3 0 0 1 3 3v11H7a3 3 0 0 1-3-3V5z" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M8 9h8M8 12h8M8 15h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </button>
  <button id="btn-settings" class="icon-btn" aria-label="Settings" title="Settings">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- ===== SETTINGS PANEL ===== -->
<aside id="settings-panel" class="panel" aria-hidden="true">
  <div class="panel-card">
    <header>
      <h3>Settings</h3>
      <button class="panel-x" data-close-panel="settings-panel" aria-label="Close">×</button>
    </header>
    <div class="panel-body">
      <div class="row">
        <label for="sound-toggle">Music</label>
        <button id="sound-toggle" class="toggle" aria-pressed="false">
          <span class="toggle-knob"></span>
          <span class="toggle-label-on">on</span>
          <span class="toggle-label-off">off</span>
        </button>
      </div>
      <div class="row">
        <label for="volume-slider">Volume</label>
        <input id="volume-slider" type="range" min="0" max="100" step="1" value="60">
      </div>
      <div class="row">
        <label for="text-speed">Reveal speed</label>
        <select id="text-speed">
          <option value="instant">Instant</option>
          <option value="fast">Fast</option>
          <option value="normal" selected>Normal</option>
          <option value="slow">Slow</option>
        </select>
      </div>
      <div class="row stacked">
        <button class="btn ghost full" id="btn-reset">Reset progress</button>
      </div>
      <p class="muted small">Your progress is saved on this device.</p>
    </div>
  </div>
</aside>

<!-- ===== HISTORY PANEL ===== -->
<aside id="history-panel" class="panel" aria-hidden="true">
  <div class="panel-card">
    <header>
      <h3>Story so far</h3>
      <button class="panel-x" data-close-panel="history-panel" aria-label="Close">×</button>
    </header>
    <div class="panel-body">
      <div id="history-summary" class="history-summary"></div>
      <ol id="history-list" class="history-list"></ol>
    </div>
  </div>
</aside>

<!-- ===== POPUP / TOAST ===== -->
<div id="popup-root" class="popup-root" aria-live="polite"></div>

<!-- ===== AUDIO ===== -->
<audio id="bg-audio" preload="none" loop></audio>

<script src="js/story.js"></script>
<script src="js/save.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
